<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Test Master</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1><i class="fa-solid fa-graduation-cap"></i> Mock Test Master</h1>
            <button id="theme-toggle" class="icon-button" aria-label="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="container">
        <!-- Dashboard View -->
        <section id="dashboard-view" class="view active">
            <div class="card">
                <h2>Configure Your Test</h2>
                <p class="subtitle">Customize your mock test generated by Gemini AI</p>
                <form id="setup-form">
                    <div class="form-group">
                        <label for="subject">Exam Category / Subject</label>
                        <select id="subject" name="subject" required>
                            <optgroup label="SSC">
                                <option value="SSC MTS general awareness and reasoning">SSC MTS</option>
                                <option value="SSC CHSL general awareness and reasoning">SSC CHSL</option>
                                <option value="SSC CGL general awareness and reasoning">SSC CGL</option>
                            </optgroup>
                            <optgroup label="RRB">
                                <option value="RRB Group D general awareness">RRB Group D</option>
                                <option value="RRB NTPC general awareness">RRB NTPC</option>
                            </optgroup>
                            <optgroup label="Defense">
                                <option value="Army Agniveer general knowledge">Army Agniveer</option>
                                <option value="Indian Navy general knowledge">Indian Navy</option>
                            </optgroup>
                            <optgroup label="Other Subjects">
                                <option value="General Knowledge">General Knowledge</option>
                                <option value="Quantitative Aptitude">Quantitative Aptitude</option>
                                <option value="Logical Reasoning">Logical Reasoning</option>
                                <option value="English Grammar">English Grammar</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="difficulty">Difficulty</label>
                        <select id="difficulty" name="difficulty" required>
                            <option value="Easy">Easy</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="Hard">Hard</option>
                        </select>
                    </div>
                    <div class="form-group" id="num-questions-group">
                        <label for="num-questions">Number of Questions</label>
                        <input type="number" id="num-questions" name="numQuestions" min="1" max="100" value="10" required>
                    </div>
                    <div id="exam-info-card" class="exam-info hidden" style="background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary-color); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem;">
                        <!-- Exam details injected here -->
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" id="start-btn">
                        <span>Generate & Start Test</span>
                        <i class="fa-solid fa-play"></i>
                    </button>
                </form>
                <div id="loading-indicator" class="hidden">
                    <div class="spinner"></div>
                    <p>Generating questions with Gemini AI...</p>
                </div>
            </div>
            
            <div class="history-section mt-4 hidden" id="history-container">
                <h3>Test History</h3>
                <ul id="history-list" class="history-list"></ul>
            </div>
        </section>

        <!-- Test View -->
        <section id="test-view" class="view hidden">
            <div class="card test-card">
                <div class="test-header">
                    <div class="progress-container">
                        <span id="question-counter">Question 1 of 10</span>
                        <div class="progress-bar">
                            <div class="progress" id="progress"></div>
                        </div>
                    </div>
                    <div class="timer">
                        <i class="fa-solid fa-stopwatch"></i> <span id="time-display">00:00</span>
                    </div>
                </div>
                
                <div class="question-container">
                    <h3 id="question-text">Loading question...</h3>
                    <div class="options-container" id="options-container">
                        <!-- Options injected here -->
                    </div>
                </div>

                <div class="test-footer">
                    <button id="prev-btn" class="btn btn-secondary" disabled>Previous</button>
                    <button id="next-btn" class="btn btn-primary">Next</button>
                    <button id="submit-test-btn" class="btn btn-success hidden">Submit Test</button>
                </div>
            </div>
        </section>

        <!-- Result View -->
        <section id="result-view" class="view hidden">
            <div class="card result-card">
                <h2>Test Completed!</h2>
                <div class="score-container">
                    <div class="score-circle">
                        <span id="final-score">0</span>
                        <span class="total">/<span id="total-score">10</span></span>
                    </div>
                    <p id="score-message">Great job!</p>
                </div>
                
                <div class="action-buttons">
                    <button id="review-btn" class="btn btn-secondary">Review Answers</button>
                    <button id="home-btn" class="btn btn-primary">Take Another Test</button>
                </div>
            </div>

            <div id="review-container" class="mt-4 hidden">
                <h3>Review</h3>
                <div id="review-list">
                    <!-- Review items injected here -->
                </div>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
